version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: first-try-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - first-try-network

  # Express API Backend
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: first-try-api
    restart: unless-stopped
    environment:
      # Database connection - uses service name 'db' as hostname
      DATABASE_URL: postgresql://postgres:postgres@db:5432/analytics_db?schema=public
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - first-try-network

  # Next.js Web Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: first-try-web
    restart: unless-stopped
    environment:
      # API connection - using localhost for browser access
      # The browser needs to access the API from outside the Docker network
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - first-try-network

volumes:
  postgres_data:
    driver: local

networks:
  first-try-network:
    driver: bridge
